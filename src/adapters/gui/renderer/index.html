<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file:; script-src 'self' file:; style-src 'self' file: 'unsafe-inline'; font-src 'self' file: data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MergeAgent GUI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div id="progress"></div>
    </header>

    <main>
      <section class="top-actions controls">
        <button id="prev-btn">⬆️ Previous conflict</button>
        <button id="next-btn">⬇️ Next conflict</button>
        <button id="resolve-btn">Regenerate AI</button>
        <button id="apply-btn">Apply AI Result</button>
        <button id="skip-btn">Skip</button>
        <button id="finish-btn">Write MERGED & Exit</button>
      </section>

      <section class="top-grid">
        <article>
          <h2>LOCAL (HEAD)</h2>
          <div id="local-content" class="code-pane" aria-label="Local file content"></div>
        </article>
        <article class="middle-controls">
          <div id="conflict-gutter" class="conflict-gutter" aria-label="Conflict selectors"></div>
        </article>
        <article>
          <h2>REMOTE (incoming)</h2>
          <div id="remote-content" class="code-pane" aria-label="Remote file content"></div>
        </article>
      </section>

      <section class="result">
        <p id="explanation"></p>
        <div class="result-wrapper">
          <div id="result-highlight" class="result-highlight" aria-hidden="true"></div>
          <textarea id="result-editor" class="result-editor" aria-label="Editable final merged content"></textarea>
        </div>
      </section>

      <section class="actions-panel">
        <label for="actions-select">Actions</label>
        <select id="actions-select">
          <option value="choose-left">Choose left</option>
          <option value="choose-right">Choose right</option>
          <option value="choose-both-left-first">Choose both (left first)</option>
          <option value="choose-both-right-first">Choose both (right first)</option>
          <option value="choose-neither">Choose neither</option>
        </select>
      </section>

      <p id="status"></p>
    </main>

    <script src="./cjs-shim.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
