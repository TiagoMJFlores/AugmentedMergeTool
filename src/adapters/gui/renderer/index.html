<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file:; script-src 'self' file:; style-src 'self' file: 'unsafe-inline'; font-src 'self' file: data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MergeAgent GUI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <button id="sidebar-toggle" class="sidebar-toggle hidden" title="Toggle file list">&#x2630;</button>
      <aside id="file-sidebar" class="file-sidebar hidden">
        <div class="sidebar-header">
          <h3>Conflicted Files</h3>
          <button id="sidebar-close" class="sidebar-close" title="Close file list">&times;</button>
        </div>
        <ul id="file-list" class="file-list"></ul>
        <div class="sidebar-footer">
          <button id="finish-all-btn" class="finish-all-btn" disabled>Save Resolved & Exit</button>
        </div>
      </aside>

      <div class="main-wrapper">
        <header>
          <div id="progress"></div>
        </header>

        <main>
          <nav class="conflict-nav">
            <button id="prev-btn" title="Previous conflict">Previous</button>
            <span id="conflict-indicator"></span>
            <span id="conflict-status" class="conflict-status"></span>
            <button id="next-btn" title="Next conflict">Next</button>
            <span class="nav-spacer"></span>
            <span id="resolve-progress" class="resolve-progress"></span>
            <button id="finish-btn">Resolve File</button>
          </nav>

          <section class="top-grid">
            <div class="pane-wrapper">
              <h4 class="pane-label">LOCAL <span class="pane-label-sub">HEAD</span></h4>
              <div id="local-content" class="code-pane" aria-label="Local file content"></div>
            </div>
            <div id="conflict-gutter" class="gutter-wrapper" aria-label="Conflict navigation"></div>
            <div class="pane-wrapper">
              <h4 class="pane-label">REMOTE <span class="pane-label-sub">incoming</span></h4>
              <div id="remote-content" class="code-pane" aria-label="Remote file content"></div>
            </div>
          </section>

          <section class="result">
            <p id="explanation"></p>
            <div class="result-wrapper">
              <div id="result-highlight" class="result-highlight" aria-hidden="true"></div>
              <textarea id="result-editor" class="result-editor" aria-label="Editable final merged content"></textarea>
            </div>
          </section>

          <section class="actions-panel">
            <label for="actions-select">Actions</label>
            <select id="actions-select">
              <option value="" disabled selected>Select action...</option>
              <option value="choose-ai">Choose AI solution</option>
              <option value="choose-left">Choose left</option>
              <option value="choose-right">Choose right</option>
              <option value="choose-both-left-first">Choose both (left first)</option>
              <option value="choose-both-right-first">Choose both (right first)</option>
            </select>
          </section>
        </main>
      </div>
    </div>

    <script src="./cjs-shim.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
