<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file:; script-src 'self' file:; style-src 'self' file: 'unsafe-inline'; font-src 'self' file: data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MergeAgent GUI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <button id="sidebar-toggle" class="sidebar-toggle hidden" title="Toggle file list">&#x2630;</button>
      <aside id="file-sidebar" class="file-sidebar hidden">
        <div class="sidebar-header">
          <h3>Conflicted Files</h3>
          <button id="sidebar-close" class="sidebar-close" title="Close file list">&times;</button>
        </div>
        <ul id="file-list" class="file-list"></ul>
        <div class="sidebar-footer">
          <button id="finish-all-btn" class="finish-all-btn" disabled>Save Resolved & Exit</button>
        </div>
      </aside>

      <div class="main-wrapper">
        <header>
          <div id="progress"></div>
        </header>

        <main>
          <nav class="conflict-nav">
            <button id="prev-btn" title="Previous conflict">Previous</button>
            <span id="conflict-indicator"></span>
            <span id="conflict-status" class="conflict-status"></span>
            <button id="next-btn" title="Next conflict">Next</button>
            <span class="nav-spacer"></span>
            <span id="resolve-progress" class="resolve-progress"></span>
            <button id="finish-btn">Resolve File</button>
            <button id="settings-btn" class="settings-btn" title="Settings">&#x2699;</button>
          </nav>

          <section class="top-grid">
            <div class="pane-wrapper">
              <h4 class="pane-label">LOCAL <span class="pane-label-sub">HEAD</span></h4>
              <div id="local-content" class="code-pane" aria-label="Local file content"></div>
            </div>
            <div id="conflict-gutter" class="gutter-wrapper" aria-label="Conflict navigation"></div>
            <div class="pane-wrapper">
              <h4 class="pane-label">REMOTE <span class="pane-label-sub">incoming</span></h4>
              <div id="remote-content" class="code-pane" aria-label="Remote file content"></div>
            </div>
          </section>

          <section class="result">
            <p id="explanation"></p>
            <div class="result-wrapper">
              <div id="result-highlight" class="result-highlight" aria-hidden="true"></div>
              <textarea id="result-editor" class="result-editor" aria-label="Editable final merged content"></textarea>
            </div>
          </section>

          <section class="actions-panel">
            <label for="actions-select">Actions</label>
            <select id="actions-select">
              <option value="" disabled selected>Select action...</option>
              <option value="choose-ai">Choose AI solution</option>
              <option value="choose-left">Choose left</option>
              <option value="choose-right">Choose right</option>
              <option value="choose-both-left-first">Choose both (left first)</option>
              <option value="choose-both-right-first">Choose both (right first)</option>
            </select>
          </section>
        </main>
      </div>
    </div>

    <div id="settings-modal" class="settings-modal hidden">
      <div class="settings-overlay"></div>
      <div class="settings-panel">
        <div class="settings-header">
          <h3>Settings</h3>
          <button id="settings-close" class="sidebar-close">&times;</button>
        </div>
        <div class="settings-body">
          <div class="settings-field">
            <label for="cfg-ai-provider">AI Provider</label>
            <select id="cfg-ai-provider">
              <option value="anthropic">Anthropic (Claude)</option>
              <option value="openai">OpenAI (GPT)</option>
            </select>
          </div>
          <div id="cfg-anthropic-fields" class="provider-fields">
            <div class="settings-field">
              <label for="cfg-anthropic-key">Anthropic API Key</label>
              <input id="cfg-anthropic-key" type="password" placeholder="sk-ant-..." autocomplete="off" />
            </div>
          </div>
          <div id="cfg-openai-fields" class="provider-fields hidden">
            <div class="settings-field">
              <label for="cfg-openai-key">OpenAI API Key</label>
              <input id="cfg-openai-key" type="password" placeholder="sk-..." autocomplete="off" />
            </div>
          </div>
          <div class="settings-field">
            <label for="cfg-provider">Ticket Provider (optional)</label>
            <select id="cfg-provider">
              <option value="none">None</option>
              <option value="linear">Linear</option>
              <option value="jira">Jira</option>
              <option value="github">GitHub</option>
            </select>
          </div>
          <div id="cfg-linear-fields" class="provider-fields hidden">
            <div class="settings-field">
              <label for="cfg-linear-key">Linear API Key</label>
              <input id="cfg-linear-key" type="password" placeholder="lin_api_..." autocomplete="off" />
            </div>
          </div>
          <div id="cfg-jira-fields" class="provider-fields hidden">
            <div class="settings-field">
              <label for="cfg-jira-key">Jira API Key</label>
              <input id="cfg-jira-key" type="password" autocomplete="off" />
            </div>
            <div class="settings-field">
              <label for="cfg-jira-url">Jira Base URL</label>
              <input id="cfg-jira-url" type="text" placeholder="https://yourcompany.atlassian.net" />
            </div>
          </div>
          <div id="cfg-github-fields" class="provider-fields hidden">
            <div class="settings-field">
              <label for="cfg-github-token">GitHub Token</label>
              <input id="cfg-github-token" type="password" autocomplete="off" />
            </div>
            <div class="settings-field">
              <label for="cfg-github-repo">GitHub Repo</label>
              <input id="cfg-github-repo" type="text" placeholder="owner/repo" />
            </div>
          </div>
        </div>
        <div class="settings-footer">
          <button id="settings-save" class="settings-save-btn">Save</button>
        </div>
      </div>
    </div>

    <script src="./cjs-shim.js"></script>
    <script src="./index.js"></script>
  </body>
</html>
